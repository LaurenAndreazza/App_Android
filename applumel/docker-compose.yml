version: '3.8'

services:
  expo-app:
    build: .
    ports:
      - "8081:8081" # Porta do Metro Bundler
    volumes:
      - .:/app
      - /app/node_modules # Evita sobrescrever os node_modules do container com o da sua máquina
    environment:
      # OBRIGATÓRIO: Substitua pelo IP local do seu computador na rede Wi-Fi!
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.15.6
      # Essencial para o Hot Reload funcionar no Docker (Windows/Mac)
      - CHOKIDAR_USEPOLLING=true 
    command: npx expo start --clear